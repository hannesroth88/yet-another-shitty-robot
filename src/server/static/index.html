<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Robot Control</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0;
         background: #0d1117; color: #e6edf3; }
  header { padding: 14px 18px; border-bottom: 1px solid #21262d;
           display: flex; align-items: center; gap: 12px; }
  #phase { font-size: 13px; padding: 3px 10px; border-radius: 999px;
           background: #21262d; }
  #phase[data-p="thinking"] { background: #1f6feb; }
  #phase[data-p="speaking"] { background: #238636; }
  #phase[data-p="error"]    { background: #da3633; }
  main { max-width: 760px; margin: 0 auto; padding: 18px; }
  #log { white-space: pre-wrap; line-height: 1.5; min-height: 40vh; }
  .you { color: #58a6ff; }
  .bot { color: #e6edf3; }
  .meta { color: #8b949e; font-size: 12px; }
  form { display: flex; gap: 8px; margin-top: 16px; }
  input { flex: 1; padding: 10px 12px; border-radius: 8px;
          border: 1px solid #30363d; background: #0d1117; color: #e6edf3; }
  button { padding: 10px 16px; border-radius: 8px; border: 0;
           background: #238636; color: #fff; cursor: pointer; }
</style>
</head>
<body>
<header>
  <strong>🤖 Robot Control</strong>
  <span id="phase" data-p="inactive">inactive</span>
  <span class="meta" id="cfg"></span>
</header>
<main>
  <div id="log"></div>
  <form id="f">
    <input id="t" placeholder="Sag etwas… (Enter zum Senden)" autocomplete="off" autofocus />
    <button>Senden</button>
  </form>
</main>
<script>
const log = document.getElementById('log');
const phaseEl = document.getElementById('phase');
const cfgEl = document.getElementById('cfg');
let botLine = null;

function line(cls, txt) {
  const d = document.createElement('div');
  d.className = cls; d.textContent = txt; log.appendChild(d);
  window.scrollTo(0, document.body.scrollHeight);
  return d;
}

const ws = new WebSocket(`ws://${location.host}/ws`);
ws.onmessage = (e) => {
  const m = JSON.parse(e.data);
  if (m.type === 'ready' || m.type === 'pong') {
    cfgEl.textContent = `${m.llm_backend||''} ${m.llm_model||''} · tts:${m.tts_backend||''}`;
  } else if (m.type === 'phase') {
    phaseEl.textContent = m.phase; phaseEl.dataset.p = m.phase;
  } else if (m.type === 'assistant_delta') {
    if (!botLine) botLine = line('bot', 'bot: ');
    botLine.textContent += m.text;
  } else if (m.type === 'assistant_end') {
    botLine = null;
  } else if (m.type === 'tts_audio') {
    const a = new Audio(`/audio?path=${encodeURIComponent(m.wav_path)}`);
    a.play().catch(()=>{});
    line('meta', `  ♪ ${m.text} (${m.synth_ms}ms)`);
  } else if (m.type === 'latency') {
    const s = m.stages || {};
    const fa = (m.info||{}).first_audio;
    line('meta', `  ⏱ ${Object.entries(s).map(([k,v])=>k+' '+Math.round(v)+'ms').join('  ')}`
      + (fa ? `  · first_audio ${Math.round(fa)}ms` : '') + `  · TOTAL ${m.total}ms`);
  } else if (m.type === 'error') {
    line('meta', `  !! ${m.message}`);
  }
};

document.getElementById('f').addEventListener('submit', (e) => {
  e.preventDefault();
  const t = document.getElementById('t');
  const txt = t.value.trim();
  if (!txt || ws.readyState !== 1) return;
  line('you', 'you: ' + txt);
  ws.send(JSON.stringify({ type: 'prompt', text: txt }));
  t.value = '';
});
</script>
</body>
</html>
