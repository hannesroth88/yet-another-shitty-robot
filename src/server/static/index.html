<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b1020" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="/static/manifest.json" />
<link rel="icon" href="/static/icon.svg" />
<link rel="apple-touch-icon" href="/static/icon.svg" />
<title>Robot</title>
<link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <b>🤖 Robot</b>
    <span id="phase" data-p="inactive">inactive</span>
    <span id="cfg"></span>
  </header>

  <main>
    <div class="lat" id="lat"></div>
    <svg id="face" xmlns="http://www.w3.org/2000/svg" aria-label="robot face"></svg>
    <video id="cam" autoplay playsinline muted></video>
    <div id="caption"></div>
  </main>

  <footer>
    <button class="mic" id="mic" title="Push to talk">🎤</button>
    <input id="prompt" placeholder="Sag etwas…" autocomplete="off" />
    <button class="primary" id="send">▶</button>
    <button class="toggle" id="camBtn" title="Kamera">📷</button>
  </footer>

  <script src="/static/face.js"></script>
  <script src="/static/barge-in.js"></script>
  <script src="/static/conversation.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
